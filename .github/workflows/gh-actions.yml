name: Build & Test

on:
  push:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    container:
        image: quantconnect/lean:foundation
        options: --cpus 12 --memory 12g
        env:
          QC_TRADIER_ENVIRONMENT: ${{ secrets.QC_TRADIER_ENVIRONMENT }}
          QC_TRADIER_ACCESS_TOKEN: ${{ secrets.QC_TRADIER_ACCESS_TOKEN }}
          QC_TRADIER_ACCOUNT_ID: ${{ secrets.QC_TRADIER_ACCOUNT_ID }}
          QC_JOB_USER_ID: ${{ secrets.JOB_USER_ID }}
          QC_API_ACCESS_TOKEN: ${{ secrets.API_ACCESS_TOKEN }}
          QC_JOB_ORGANIZATION_ID: ${{ secrets.JOB_ORGANIZATION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Checkout Lean Same Branch
        id: lean-same-branch
        uses: actions/checkout@v2
        continue-on-error: true
        with:
          ref: ${{ github.ref }}
          repository: QuantConnect/Lean
          path: Lean

      - name: Checkout Lean Master
        if: steps.lean-same-branch.outcome != 'success'
        uses: actions/checkout@v2
        with:
          repository: QuantConnect/Lean
          path: Lean

      - name: Move Lean
        run: mv Lean ../Lean

      - name: Run build and tests
        run: |
          # Build
          dotnet build /p:Configuration=Release /v:quiet /p:WarningLevel=1 QuantConnect.TradierBrokerage.sln && \
          # Run Tests
          dotnet test ./QuantConnect.TradierBrokerage.Tests/bin/Release/QuantConnect.TradierBrokerage.Tests.dll

